<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Create your CrewFinder account - Login/Sign Up</title>
</head>

<body>

    <button onclick="window.location.href='index.html'">← Back</button>

    <header>
        <h1>Create your CrewFinder account</h1>

        <p>Please sign up using your username and password</p>

        <p>
            Already have an account?
            <a href="login.html">Login</a>
        </p>
    </header>

    <main>

        <section id="signup-section">

            <h2>Sign Up</h2>

            <!-- CONNECTS TO FLASK -->
            <form action="/register" method="POST">

                <label for="signup-username">Username:</label><br>
                <input type="text" id="signup-username" name="username" required><br><br>

                <label for="signup-email">MMU Email:</label><br>
                <input type="email"
                       id="signup-email"
                       name="email"
                       placeholder="example@student.mmu.edu.my"
                       required><br><br>

                <label for="signup-password">Password:</label><br>
                <input type="password"
                       id="signup-password"
                       name="password"
                       required><br><br>

                <label for="signup-confirm-password">Confirm Password:</label><br>
                <input type="password"
                       id="signup-confirm-password"
                       name="confirm_password"
                       required><br><br>

                <button type="submit" id="signup-btn">
                    Sign Up
                </button>

            </form>

        </section>

    </main>

</body>
</html>
