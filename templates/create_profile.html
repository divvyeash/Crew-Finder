<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CrewFinder - Create Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body style="background-color:#0f172a; padding:40px 20px;">
    <div class="login-container" style="max-width:550px; margin:0 auto; background-color:#1e293b; border-radius:16px; border:1px solid #334155; padding:32px; box-shadow:0 10px 25px rgba(0,0,0,0.5);">
        
        <div class="form-header" style="text-align:center; margin-bottom:24px;">
            <h2 style="font-size:1.6rem; font-weight:800; color:white;">Create Your Student Profile</h2>
            <p style="color:#94a3b8; font-size:0.9rem;">Fill in your details so other CrewFinder users can discover you.</p>
        </div>

        <form action="{{ url_for('create_profile') }}" method="POST">
            <div class="input-group">
                <label style="color:#cbd5e1; display:block; font-weight:600; margin-bottom:6px;">Your Course / Major</label>
                <input type="text" name="course" placeholder="e.g. Computer Science" required style="width:100%; padding:12px; background-color:#0f172a; border:1px solid #334155; color:white; border-radius:8px;">
            </div>

            <div class="input-group" style="margin-top:16px;">
                <label style="color:#cbd5e1; display:block; font-weight:600; margin-bottom:6px;">Current Semester</label>
                <input type="text" name="semester" placeholder="e.g. Trimester 1, Year 2" required style="width:100%; padding:12px; background-color:#0f172a; border:1px solid #334155; color:white; border-radius:8px;">
            </div>

            <div class="input-group" style="margin-top:16px;">
                <label style="color:#cbd5e1; display:block; font-weight:600; margin-bottom:6px;">Your Skills (Separate with commas)</label>
                <input type="text" name="skills" placeholder="e.g. Python, CSS, HTML, Figma" required style="width:100%; padding:12px; background-color:#0f172a; border:1px solid #334155; color:white; border-radius:8px;">
            </div>

            <div class="input-group" style="margin-top:16px;">
                <label style="color:#cbd5e1; display:block; font-weight:600; margin-bottom:6px;">Profile Avatar Picture Keywords (Random word)</label>
                <input type="text" name="avatar_name" placeholder="Type anything (e.g. happy, coder) to generate custom art" required style="width:100%; padding:12px; background-color:#0f172a; border:1px solid #334155; color:white; border-radius:8px;">
            </div>

            <div class="input-group" style="margin-top:16px;">
                <label style="color:#cbd5e1; display:block; font-weight:600; margin-bottom:6px;">Your Short Bio Summary</label>
                <textarea name="bio" placeholder="Tell students about your project goals or background..." required style="width:100%; height:90px; padding:12px; background-color:#0f172a; border:1px solid #334155; color:white; border-radius:8px; resize:none; font-family:inherit;"></textarea>
            </div>

            <button type="submit" class="btn-submit" style="width:100%; padding:14px; background-color:#0284c7; color:white; border:none; font-weight:700; border-radius:8px; cursor:pointer; margin-top:20px;">Save Profile Portfolio</button>
            <a href="{{ url_for('index') }}" style="display:block; text-align:center; margin-top:14px; color:#94a3b8; text-decoration:none; font-size:0.9rem;">Go to Dashboard</a>
        </form>
    </div>
</body>
</html>
