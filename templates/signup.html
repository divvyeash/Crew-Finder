<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">

<section id="signup-section">
    <button onclick="window.location.href='index.html'">← Back</button>
    <form id="signup-form">
    <title>Create your CrewFinder account- Login/Sign Up</title>
</head>
<body>


<header>
    <h1>Create your CrewFinder account</h1>
    <p>Please login using your username and password</p>
    <p>
    Already have an account?
    <a href="login.html">Login</a>
</p>
</header>

<main>

    <section id="signup-section">
        <h2>SignUp</h2>

        <form id="signup-form">

        <label for="signup-username">Username:</label><br>
        <input type="text" id="signup-username" name="username"><br><br>

        <label for="signup-email">MMU Email:</label><br>
        <input type="email" id="signup-email" name="email" placeholder="example@student.mmu.edu.my"><br><br>
    
        <label for="signup-password">Password:</label><br>
        <input type="password" id="signup-password" name="password"><br><br>

        <label for="signup-confirm-password">Confirm Password:</label><br>
        <input type="password" id="signup-confirm-password" name="confirm-password"><br><br>

        <button type="submit" id="signup-btn">SignUp</button>

        </form>

    </section>


</main>

</body>
</html>

</main>

</body>
</html>
